name: ci
on: [push, pull_request]
jobs:
  suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      # The repo's own documented install (README quickstart) - the first
      # CI run installed bare pytest and died on collection because
      # analysis.py imports the pillar packages at module level.
      - run: pip install -e ".[pillars,crypto,dev]"
      - run: python -m pytest -q
